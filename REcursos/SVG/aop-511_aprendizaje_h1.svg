        </defs><path d="M35,0 L341,0 Q376,0 376,35 L376,92 L0,92 L0,35 Q0,0 35,0 Z" fill="#f16522"/><polygon points="0,92 14,104 362,104 376,92" fill="#d34704"/><rect x="14" y="104" width="348" height="574" fill="#dddddd"/><polygon points="376,678 362,666 14,666 0,678" fill="#7993ff"/><path d="M0,678 L376,678 L376,837 Q376,872 341,872 L35,872 Q0,872 0,837 Z" fill="#516bed"/><text x="188" y="46" font-family="'Suprema', Arial, sans-serif" font-size="60" fill="#FFF" font-weight="700" text-anchor="middle" dominant-baseline="central">Hito 1</text><g clip-path="url(#bodyClip)"><text x="33" y="132" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">Comprende e interpreta los</text><text x="33" y="159" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">conceptos y normas contables</text><text x="33" y="186" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">aplicables a la elaboración de</text><text x="33" y="213" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">estados financieros, diferenciando</text><text x="33" y="240" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">los distintos tipos de auditoría</text><text x="33" y="267" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">existentes, con el fin de analizar la</text><text x="33" y="294" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">información financiera de manera</text><text x="33" y="321" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">crítica y fundamentada, apoyando</text><text x="33" y="348" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">la toma de decisiones</text><text x="33" y="375" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#00