        </defs><path d="M35,0 L341,0 Q376,0 376,35 L376,92 L0,92 L0,35 Q0,0 35,0 Z" fill="#f16522"/><polygon points="0,92 14,104 362,104 376,92" fill="#d34704"/><rect x="14" y="104" width="348" height="574" fill="#dddddd"/><polygon points="376,678 362,666 14,666 0,678" fill="#7993ff"/><path d="M0,678 L376,678 L376,837 Q376,872 341,872 L35,872 Q0,872 0,837 Z" fill="#516bed"/><text x="188" y="46" font-family="'Suprema', Arial, sans-serif" font-size="60" fill="#FFF" font-weight="700" text-anchor="middle" dominant-baseline="central">Hito 4</text><g clip-path="url(#bodyClip)"><text x="33" y="132" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">Aplica técnicas de auditoría para</text><text x="33" y="159" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">cumplir con exactitud los</text><text x="33" y="186" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">procedimientos diseñados en el</text><text x="33" y="213" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">Programa de Auditoría y</text><text x="33" y="240" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">determinar resultados de la</text><text x="33" y="267" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">gestión que se traducen en</text><text x="33" y="294" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">determinar el nivel de eficiencia,</text><text x="33" y="321" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">eficacia y economía de las</text><text x="33" y="348" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">operaciones evaluadas,</text><text x="33" y="375" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">demostrando independencia,</text><text x="33" y="402" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">cualidades personales,</text><text x="33" y="429" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">profesionales y técnicas en el</text><text x="33" y="456" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">análisis de los procesos</text><text x="33" y="483" font-family="'Suprema', Arial, sans-serif" font-size="20" fill="#000" text-anchor="start">organizacionales.</text></g><g clip-path="url(#footerClip)"><text x="188" y="715" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">¿Por qué es importante aplicar técnicas</text><text x="188" y="735.8" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">de auditoría para obtener resultados que</text><text x="188" y="756.5999999999999" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">determinen orientar a mejorar la</text><text x="188" y="777.3999999999999" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">eficiencia, eficacia y economía de las</text><text x="188" y="798.1999999999998" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">operaciones, y cómo pueden influir en la</text><text x="188" y="818.9999999999998" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">toma de decisiones dentro de una</text><text x="188" y="839.7999999999997" font-family="'Suprema', Arial, sans-serif" font-size="16" fill="#FFF" font-weight="600" text-anchor="middle">organización?</text></g>
